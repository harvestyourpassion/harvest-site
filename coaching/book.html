<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Coaching — Harvest Your Passion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/nav.js"></script>
<script src="/shared/devpanel.js"></script>
<script src="/shared/pwa.js"></script>
<link rel="stylesheet" href="/shared/h-components.css">
<script src="/shared/h-components.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  body { margin:0; background:var(--bg); color:var(--text-primary); font-family:Inter,system-ui,sans-serif; }
  .bk-wrap { max-width:900px; margin:0 auto; padding:32px 20px; }
  .bk-h1 { font-size:var(--text-3xl); font-weight:700; margin:0 0 4px; color:#f1f5f9; }
  /* Lighter than --text-secondary for readable body copy on the dark bg. */
  .bk-sub { color:#cbd5e1; margin:0 0 24px; font-size:16px; }
  .bk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .bk-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; display:flex; flex-direction:column; }
  .bk-price { color:#4ade80; font-weight:700; font-size:28px; margin:6px 0; }
  .bk-name { font-weight:700; font-size:18px; color:#f1f5f9; }
  .bk-desc { color:#cbd5e1; font-size:14px; margin:6px 0 14px; flex:1; line-height:1.5; }
  /* High-contrast, clearly-clickable time slots. */
  .bk-slot { background:var(--elevated) !important; color:#f1f5f9 !important; border:1px solid #64748b !important; font-weight:600; }
  .bk-slot:hover { background:var(--accent-blue) !important; border-color:var(--accent-blue) !important; color:#fff !important; }
  .h-empty__title { color:#f1f5f9; }
  .h-muted { color:#cbd5e1 !important; }
</style>
</head>
<body>
<div class="bk-wrap h-scope" id="bk-root"></div>

<script>
  var COACH_ID = '389b085c-19f1-4b45-b989-a94cc7863288';
  function param(k){ return new URLSearchParams(location.search).get(k); }
  function money(n){ return '$' + Number(n||0).toLocaleString(); }

  function init(){
    var sb = window.getSb();
    var root = document.getElementById('bk-root');

    // Returning from successful payment → schedule the first session.
    if (param('paid') === '1'){
      scheduleFlow(root);
      return;
    }

    root.innerHTML = '<h1 class="bk-h1">Book a Session</h1><p class="bk-sub">Pick the package that fits where you’re at.</p>' + H.loading({ skeleton:true, count:3 });

    sb.from('packages').select('*').eq('coach_id', COACH_ID).eq('is_active', true).order('price')
      .then(function(res){
        var pkgs = res.data || [];
        var html = '<h1 class="bk-h1">Book a Session</h1><p class="bk-sub">Pick the package that fits where you’re at.</p>';
        if (!pkgs.length){
          html += H.empty({ icon:'📦', title:'No packages available', description:'Check back soon, or reach out.', cta:{ label:'Contact', href:'/contact/' } });
          root.innerHTML = html; return;
        }
        html += '<div class="bk-grid">';
        pkgs.forEach(function(p){
          html += '<div class="bk-card">' +
            '<div class="bk-name">' + H.esc(p.name) + '</div>' +
            '<div class="bk-price">' + money(p.price) + '</div>' +
            '<div class="bk-desc">' + H.esc(p.description||'') + '</div>' +
            '<div class="h-row" style="gap:6px;flex-wrap:wrap;margin-bottom:12px">' +
              H.badge(p.hours + ' hrs', 'neutral') +
              (p.session_count ? H.badge(p.session_count + (p.session_count == 1 ? ' session' : ' sessions'), 'neutral') : '') +
            '</div>' +
            H.button({ label:'Book — ' + money(p.price), block:true, class:'bk-book', id:'book-'+p.id }) +
          '</div>';
        });
        html += '</div>';
        html += '<p class="h-muted" style="margin-top:18px;font-size:13px">Secure payment via Stripe. You’ll sign in first so your session and resources land in your account.</p>';
        root.innerHTML = html;
        pkgs.forEach(function(p){
          var b = document.getElementById('book-'+p.id);
          if (b) b.addEventListener('click', function(){ startCheckout(p.id); });
        });

        // Auto-resume checkout after OAuth round-trip
        var resume = param('pkg');
        if (resume) startCheckout(resume);
      });
  }

  function startCheckout(packageId){
    console.log('[book] startCheckout', packageId);
    var sb = window.getSb();
    if (!sb){ H.toast('Still loading — try again in a moment.', 'error'); return; }
    window.getUser().then(function(user){
      console.log('[book] user:', user && user.email);
      if (!user){
        var back = window.location.origin + '/coaching/book.html?pkg=' + encodeURIComponent(packageId);
        H.toast('Redirecting to sign in…', 'info');
        window.signIn(back);
        return;
      }
      H.toast('Starting secure checkout…', 'info');
      return sb.functions.invoke('stripe-checkout', {
        body: {
          package_id: packageId,
          client_email: user.email,
          success_url: window.location.origin + '/coaching/book.html?paid=1',
          cancel_url: window.location.origin + '/coaching/book.html'
        }
      }).then(function(res){
        console.log('[book] invoke result:', res);
        var data = res && res.data, error = res && res.error;
        if (error || !data || !data.url){
          var msg = (data && data.error) || (error && error.message) || 'Checkout unavailable';
          if (String(msg).toLowerCase().indexOf('disabled') !== -1){
            H.modal({ title:'Payments not live yet',
              body:'<p class="h-muted">Online payment isn’t switched on yet. Reach out and Leo will get you booked directly.</p>',
              actions:[{ label:'Contact', variant:'primary', href:'/contact/' }] });
          } else {
            H.toast('Could not start checkout: ' + msg, 'error');
          }
          return;
        }
        console.log('[book] redirecting to', data.url);
        window.location.href = data.url;
      });
    }).catch(function(err){
      // Any rejection (network/CORS/auth) surfaces here instead of failing silently.
      console.error('[book] checkout failed:', err);
      H.toast('Checkout error: ' + (err && err.message ? err.message : err), 'error');
    });
  }

  // ===== Post-payment: schedule first session from coach availability =====
  function welcomeCard(extra){
    return '<div class="h-empty"><div class="h-empty__icon">🎉</div>' +
      '<div class="h-empty__title">Payment received — welcome aboard.</div>' +
      '<p class="h-muted">' + (extra || 'Your workspace is ready.') + '</p>' +
      '<div style="margin-top:16px">' + H.button({ label:'Open Roots', href:'/roots/' }) + '</div></div>';
  }

  function scheduleFlow(root){
    var sb = window.getSb();
    root.innerHTML = H.loading({ skeleton:true, count:2 });
    window.getUser().then(function(user){
      if (!user){
        // Scheduling requires authentication — never show slots to a signed-out visitor.
        root.innerHTML = '<div class="h-empty"><div class="h-empty__icon">🔒</div>' +
          '<div class="h-empty__title">Please sign in to schedule</div>' +
          '<p class="h-muted">Sign in with the account you booked with to pick your session time.</p>' +
          '<div style="margin-top:16px">' + H.button({ label:'Sign in', id:'bk-signin' }) + '</div></div>';
        var sb2 = document.getElementById('bk-signin');
        if (sb2) sb2.addEventListener('click', function(){ window.signIn(window.location.origin + '/coaching/book.html?paid=1'); });
        return;
      }
      var nowMs = Date.now();
      Promise.all([
        sb.from('clients').select('id').eq('coach_id', COACH_ID).eq('email', user.email).maybeSingle(),
        sb.from('availability').select('*').eq('coach_id', COACH_ID),
        sb.from('sessions').select('scheduled_at').eq('coach_id', COACH_ID),
        // Real free/busy from the coach's Google Calendar (no-op if not connected/disabled).
        sb.functions.invoke('google-calendar', { body: {
          action: 'freebusy', coach_id: COACH_ID,
          time_min: new Date(nowMs).toISOString(),
          time_max: new Date(nowMs + 15*864e5).toISOString()
        }}).then(function(r){ return r; }).catch(function(){ return { data:{ busy:[] } }; })
      ]).then(function(res){
        var client = res[0].data;
        var avail = res[1].data || [];
        var booked = (res[2].data || []).map(function(s){ return new Date(s.scheduled_at).getTime(); });
        var busy = (res[3] && res[3].data && res[3].data.busy) || [];
        var slots = buildSlots(avail, booked, busy);
        var html = '<h1 class="bk-h1">🎉 You’re in — pick your first session</h1>' +
          '<p class="bk-sub">Choose a time that works. You’ll get a Zoom link instantly.</p>';
        if (!slots.length){
          root.innerHTML = welcomeCard('You’re all set. Leo will reach out to schedule your first session.');
          return;
        }
        html += '<div style="display:flex;flex-direction:column;gap:16px">';
        var byDay = {};
        slots.forEach(function(s){ (byDay[s.dayLabel]=byDay[s.dayLabel]||[]).push(s); });
        Object.keys(byDay).forEach(function(day){
          html += '<div><div style="font-weight:600;margin-bottom:6px">' + day + '</div><div class="h-row" style="flex-wrap:wrap;gap:8px">';
          byDay[day].forEach(function(s){
            html += '<button class="h-btn h-btn--secondary bk-slot" data-iso="' + s.iso + '" style="min-height:38px">' + s.timeLabel + '</button>';
          });
          html += '</div></div>';
        });
        html += '</div>';
        html += '<div style="margin-top:16px">' + H.button({ label:'Skip for now', variant:'ghost', href:'/roots/' }) + '</div>';
        root.innerHTML = html;
        root.querySelectorAll('.bk-slot').forEach(function(b){
          b.addEventListener('click', function(){ bookSlot(client, b.getAttribute('data-iso'), root); });
        });
      }).catch(function(e){ root.innerHTML = welcomeCard('You’re all set. (Scheduling will be available shortly.)'); console.error('[book] schedule load', e); });
    });
  }

  function buildSlots(avail, bookedTimes, busy){
    // Weekly recurring hours → hourly slots for the next 14 days, excluding
    // already-booked sessions AND Google Calendar busy intervals.
    busy = (busy || []).map(function(b){ return { s:new Date(b.start).getTime(), e:new Date(b.end).getTime() }; });
    function isBusy(startMs, endMs){
      for (var i=0;i<busy.length;i++){ if (startMs < busy[i].e && endMs > busy[i].s) return true; }
      return false;
    }
    var byDow = {};
    avail.forEach(function(a){ if (a.day_of_week != null) byDow[a.day_of_week] = a; });
    var out = [], now = new Date();
    for (var d = 1; d <= 14 && out.length < 24; d++){
      var day = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d);
      var a = byDow[day.getDay()];
      if (!a) continue;
      var sh = parseInt((a.start_time||'09:00').slice(0,2),10);
      var eh = parseInt((a.end_time||'17:00').slice(0,2),10);
      for (var h = sh; h < eh; h++){
        var slot = new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, 0, 0);
        if (bookedTimes.indexOf(slot.getTime()) !== -1) continue;
        if (isBusy(slot.getTime(), slot.getTime()+3600000)) continue;
        out.push({
          iso: slot.toISOString(),
          dayLabel: slot.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'}),
          timeLabel: slot.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
        });
        if (out.length >= 24) break;
      }
    }
    return out;
  }

  function bookSlot(client, iso, root){
    var sb = window.getSb();
    H.toast('Booking your session…', 'info');
    if (!client){ // safety: client record not linked yet
      root.innerHTML = welcomeCard('You’re all set. Leo will confirm your session time shortly.');
      return;
    }
    sb.from('sessions').insert({
      client_id: client.id, coach_id: COACH_ID, scheduled_at: iso,
      duration_minutes: 60, mode: 'coaching', status: 'scheduled'
    }).select('id').maybeSingle().then(function(res){
      if (res.error || !res.data){ H.toast('Could not book: ' + (res.error && res.error.message), 'error'); return; }
      var sessionId = res.data.id;
      // Attach a Zoom link (best-effort; gated by zoom flag server-side).
      sb.functions.invoke('zoom-meeting', {
        body: { topic:'Harvest Coaching Session', start_time: iso, duration: 60, session_id: sessionId }
      }).then(function(z){
        var link = z && z.data && z.data.join_url;
        // Push onto the coach's Google Calendar (no-op if not connected/disabled).
        sb.functions.invoke('google-calendar', { body: { action:'create-event', coach_id: COACH_ID, session_id: sessionId } }).catch(function(){});
        showBooked(root, iso, link);
      }).catch(function(){ showBooked(root, iso, null); });
    });
  }

  function showBooked(root, iso, zoomLink){
    var when = new Date(iso).toLocaleString(undefined,{weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'});
    root.innerHTML = '<div class="h-empty"><div class="h-empty__icon">✅</div>' +
      '<div class="h-empty__title">Session booked</div>' +
      '<p class="h-muted">' + when + '</p>' +
      (zoomLink ? '<p style="margin-top:8px"><a href="' + H.esc(zoomLink) + '" style="color:var(--accent-green);font-weight:600">Your Zoom link</a></p>'
                : '<p class="h-muted" style="margin-top:8px">A Zoom link will be sent before your session.</p>') +
      '<div style="margin-top:16px">' + H.button({ label:'Open Roots', href:'/roots/' }) + '</div></div>';
  }

  if (window.getSb && window.getSb()) init();
  else document.addEventListener('DOMContentLoaded', function(){ setTimeout(init, 150); });
</script>
</body>
</html>
