<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden — Harvest Your Passion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/nav.js"></script>
<script src="/shared/devpanel.js"></script>
<script src="/shared/pwa.js"></script>
<link rel="stylesheet" href="/shared/h-components.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  body { margin:0; background:var(--bg); color:var(--text-primary); font-family:Inter,system-ui,sans-serif; }
  .g-shell { display:flex; min-height:calc(100vh - 52px); }
  .g-side { width:220px; flex:0 0 220px; background:var(--surface); border-right:1px solid var(--border); padding:16px 10px; }
  .g-nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-md); color:var(--text-secondary); cursor:pointer; font-size:14px; font-weight:600; text-decoration:none; }
  .g-nav-item.is-active, .g-nav-item:hover { background:var(--elevated); color:var(--text-primary); }
  .g-main { flex:1; padding:20px; max-width:1100px; }
  .g-h1 { font-size:var(--text-2xl); font-weight:700; margin:0 0 4px; }
  .g-sub { color:var(--text-secondary); margin:0 0 20px; }
  .g-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:24px; }
  .g-section-title { font-size:var(--text-lg); font-weight:700; margin:24px 0 12px; }
  @media (max-width:760px){ .g-side{ display:none; } .g-main{ padding:14px; } }
</style>
</head>
<body>
<div class="g-shell h-scope">
  <aside class="g-side">
    <a class="g-nav-item is-active" data-view="dashboard">📊 Dashboard</a>
    <a class="g-nav-item" data-view="clients">👥 Clients</a>
    <a class="g-nav-item" data-view="sessions">📅 Sessions</a>
    <a class="g-nav-item" data-view="packages">📦 Packages</a>
    <a class="g-nav-item" data-view="resources">📚 Resources</a>
    <a class="g-nav-item" href="/content/">✍️ Content</a>
  </aside>
  <main class="g-main" id="g-main">
    <div id="g-loading"></div>
  </main>
</div>

<script src="/shared/guard.js"></script>
<script src="/garden/garden.js"></script>
<script>
  document.getElementById('g-main').innerHTML = H.loading({ skeleton:true, count:4 });
  HGuard.require('admin').then(function(profile){ Garden.init(profile); });
</script>
</body>
</html>
